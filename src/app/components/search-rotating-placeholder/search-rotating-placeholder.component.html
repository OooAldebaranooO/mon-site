<form class="search-box" (ngSubmit)="onSearch()">
  <span class="search-icon" aria-hidden="true">🔎</span>

  <div class="input-wrapper">
    <input
      type="text"
      name="search"
      [(ngModel)]="search"
      (focus)="onFocus()"
      (blur)="onBlur()"
    />

    @if (!search) {
      <span class="fake-placeholder">
        {{ fixedPrefix }}{{ animatedText() }}<span class="cursor">|</span>
      </span>
    }
  </div>

  <button type="submit">Rechercher</button>
</form>
