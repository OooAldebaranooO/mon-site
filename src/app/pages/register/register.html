<div class="register-container">
  <h2>Créer un compte</h2>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="displayName">Nom complet</label>
      <input
        id="displayName"
        type="text"
        formControlName="displayName"
        [class.invalid]="f.displayName.touched && f.displayName.invalid"
      />

      <small *ngIf="f.displayName.touched && f.displayName.errors?.['required']">
        Le nom est requis.
      </small>
      <small *ngIf="f.displayName.touched && f.displayName.errors?.['minlength']">
        Le nom doit contenir au moins 2 caractères.
      </small>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        [class.invalid]="f.email.touched && f.email.invalid"
      />

      <small *ngIf="f.email.touched && f.email.errors?.['required']">
        L’email est requis.
      </small>
      <small *ngIf="f.email.touched && f.email.errors?.['email']">
        Format d’email invalide.
      </small>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <div class="password-wrapper">
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          [class.invalid]="f.password.touched && f.password.invalid"
        />
        <button
          type="button"
          class="toggle-password"
          (click)="togglePassword()"
        >
          {{ showPassword ? 'Masquer' : 'Afficher' }}
        </button>
      </div>

      <div class="password-strength">
        <div class="strength-bar">
          <div
            class="strength-fill"
            [style.width.%]="passwordStrength.percent"
            [class.weak]="passwordStrength.level === 'weak'"
            [class.medium]="passwordStrength.level === 'medium'"
            [class.strong]="passwordStrength.level === 'strong'"
          ></div>
        </div>
        <span>{{ passwordStrength.label }}</span>
      </div>

      <small *ngIf="f.password.touched && f.password.errors?.['required']">
        Le mot de passe est requis.
      </small>
      <small *ngIf="f.password.touched && f.password.errors?.['minlength']">
        Le mot de passe doit contenir au moins 12 caractères.
      </small>
    </div>

    <button type="submit" [disabled]="loading">
      <span *ngIf="!loading">S’inscrire</span>
      <span *ngIf="loading">Création du compte...</span>
    </button>
  </form>

  <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
</div>
